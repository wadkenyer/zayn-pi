<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تأكيد الحجز</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { background:#F8F9FA; font-family:sans-serif; }
</style>
</head>
<nav class="fixed bottom-0 w-full bg-white border-t flex justify-around p-3">
<a href="index.html">🏠</a>
<a href="bookings.html">📅</a>
<a href="profile.html">👤</a>
</nav>

<body class="p-4">

<h2 class="text-xl font-bold mb-4">تأكيد الحجز</h2>

<div class="bg-white p-4 rounded-xl shadow mb-4">
<p id="salon"></p>
<p>الخدمة: حلاقة</p>
<p id="price"></p>
</div>

<button onclick="confirmBooking()"
class="w-full py-3 bg-green-500 text-white rounded-xl font-bold">
تأكيد الحجز
</button>

<script>
document.getElementById("salon").innerText =
"الصالون: " + localStorage.getItem("salon");

document.getElementById("price").innerText =
"السعر: " + localStorage.getItem("price") + " Pi";

function confirmBooking(){
let bookings = JSON.parse(localStorage.getItem("bookings") || "[]");

bookings.push({
salon: localStorage.getItem("salon"),
price: localStorage.getItem("price"),
date: new Date().toLocaleString()
});

localStorage.setItem("bookings", JSON.stringify(bookings));

window.location.href = "bookings.html";
}
</script>

</body>
</html>
