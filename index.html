<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAYN PI | صالون حلاقة وتجميل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --teal: #4DAF9F; --dark-teal: #3A8A7A; --bg: #F8F9FA; }
        body { background: var(--bg); font-family: system-ui, sans-serif; }
        .card { background: #fff; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); overflow: hidden; transition: all 0.3s ease; }
        .card:active { transform: scale(0.98); }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; color: #888; transition: color 0.3s; }
        .nav-item.active { color: var(--teal); }
        .btn-pi { background: linear-gradient(135deg, var(--teal), var(--dark-teal)); color: white; box-shadow: 0 4px 15px rgba(77,175,159,0.3); transition: all 0.3s; }
        .btn-pi:disabled { opacity: 0.7; cursor: not-allowed; }
    </style>
</head>
<body class="p-4 pb-28 min-h-screen">

<div id="home-page" class="page active">
    <div class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-3xl font-black text-teal-600">ZAYN PI</h1>
            <p id="user-greeting" class="text-sm text-gray-500">جاري التحقق من حسابك...</p>
        </div>
        <button onclick="initPi()" class="px-6 py-2 bg-teal-600 text-white rounded-2xl text-sm font-medium">دخول بـ Pi</button>
    </div>

    <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
        <i class="fas fa-star text-yellow-400"></i> الصالونات المميزة
    </h2>
    <div id="salon-container" class="space-y-6"></div>
</div>

<div id="bookings-page" class="page">
    <h2 class="text-2xl font-bold text-center mb-6">حجوزاتي</h2>
    <div id="my-bookings-list" class="space-y-4"></div>
</div>

<div id="profile-page" class="page text-center">
    <div class="card p-10 mx-auto max-w-xs">
        <div class="w-24 h-24 mx-auto bg-teal-100 rounded-full flex items-center justify-center text-6xl mb-4">👤</div>
        <h3 id="profile-name" class="text-2xl font-bold">زائر</h3>
        <p id="profile-status" class="text-gray-500">مستخدم Pi Network</p>
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="switchPage('home-page', this)"><i class="fas fa-home text-2xl"></i><span class="text-xs">الرئيسية</span></div>
    <div class="nav-item" onclick="switchPage('bookings-page', this)"><i class="fas fa-calendar-check text-2xl"></i><span class="text-xs">حجوزاتي</span></div>
    <div class="nav-item" onclick="switchPage('profile-page', this)"><i class="fas fa-user text-2xl"></i><span class="text-xs">حسابي</span></div>
</nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, serverTimestamp, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCVePZCyyeVw9xDlov2B_db8VsIEayw8Rk",
    authDomain: "zayn-pi.firebaseapp.com",
    projectId: "zayn-pi",
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUser = null;
let isProcessingPayment = false;

const salons = [
    {id:"s1", name:"صالون الملكي", city:"القاهرة", price:0.5, rate:4.8, img:"https://images.unsplash.com/photo-1503951914875-452162b0f3f1?w=600"},
    {id:"s2", name:"Luxury Beauty", city:"دبي", price:1.0, rate:4.9, img:"https://images.unsplash.com/photo-1621605815971-fbc98d665033?w=600"},
    {id:"s3", name:"باربيرا برو", city:"الرياض", price:0.8, rate:4.7, img:"https://images.unsplash.com/photo-1556228720-195a672ee8b6?w=600"}
];

// معالجة الدفعات المعلقة
const onIncompletePaymentFound = async (payment) => {
    const paymentId = payment.identifier || payment.paymentId;
    console.log("⚠️ Pending payment found:", payment);

    try {
        const status = payment.status;
        if (status === 'INITIATED') {
            await fetch('/api/approve', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ paymentId }) });
        } else if (status === 'APPROVED') {
            if (payment.transaction?.txid) {
                await fetch('/api/complete', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ paymentId, txid: payment.transaction.txid }) });
            }
        } else {
            await fetch('/api/cancel', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ paymentId }) });
        }
    } catch (e) {
        console.error("Error handling incomplete payment:", e);
    }
};

window.initPi = async () => {
    try {
        await Pi.init({ version: "2.0", sandbox: true });
        const auth = await Pi.authenticate(['username', 'payments'], onIncompletePaymentFound);
        currentUser = auth.user;

        document.getElementById("user-greeting").innerHTML = `مرحباً، <span class="font-bold text-teal-600">${currentUser.username}</span>`;
        document.getElementById("profile-name").textContent = currentUser.username;
        document.getElementById("profile-status").textContent = "متصل ✓";
    } catch (e) {
        console.error(e);
        alert("يرجى فتح التطبيق داخل Pi Browser");
    }
};

window.switchPage = (pageId) => {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
    if (pageId === 'bookings-page') loadBookings();
};

window.book = async (salon) => {
    if (isProcessingPayment) return alert("جاري معالجة الدفع السابق...");
    if (!currentUser) return alert("يرجى تسجيل الدخول أولاً");

    isProcessingPayment = true;

    if (!confirm(`هل تريد دفع ${salon.price} Pi لحجز في ${salon.name}؟`)) {
        isProcessingPayment = false;
        return;
    }

    try {
        const paymentData = {
            amount: salon.price,
            memo: `حجز ${salon.name} - ZAYN PI`,
            metadata: { salonId: salon.id, user: currentUser.username }
        };

        await Pi.createPayment(paymentData, {
            onReadyForServerApproval: async (paymentId) => {
                await fetch('/api/approve', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ paymentId })
                });
            },

            onReadyForServerCompletion: async (paymentId, txid) => {
                await fetch('/api/complete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ paymentId, txid })
                });

                const verifyRes = await fetch('/api/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ paymentId })
                });
                const verifyData = await verifyRes.json();

                if (verifyData.status?.developer_completed === true && verifyData.status?.transaction_verified === true) {
                    await addDoc(collection(db, "bookings"), {
                        user: currentUser.username,
                        salon: salon.name,
                        amount: salon.price,
                        txid: txid,
                        status: "confirmed",
                        createdAt: serverTimestamp()
                    });

                    alert(`✅ تم الحجز بنجاح!\nرقم المعاملة: ${(txid || '').slice(0,12)}...`);
                    switchPage('bookings-page');
                } else {
                    alert("⚠️ الدفع تم تسجيله لكنه لم يكتمل بشكل كامل");
                }
            },

            onCancel: () => alert("تم إلغاء الدفع"),
            onError: (err) => alert("خطأ في الدفع: " + (err.message || err))
        });
    } catch (e) {
        console.error(e);
        alert("حدث خطأ أثناء بدء الدفع");
    } finally {
        isProcessingPayment = false;
    }
};

async function loadBookings() {
    const list = document.getElementById("my-bookings-list");
    if (!currentUser) {
        list.innerHTML = "<p class='text-center text-gray-400 py-10'>سجل الدخول لرؤية حجوزاتك</p>";
        return;
    }

    list.innerHTML = "<div class='text-center py-10'><i class='fas fa-circle-notch fa-spin text-teal-500 text-3xl'></i></div>";

    try {
        const q = query(collection(db, "bookings"), where("user", "==", currentUser.username), orderBy("createdAt", "desc"));
        const snap = await getDocs(q);

        if (snap.empty) {
            list.innerHTML = "<p class='text-center text-gray-400 py-10'>لا توجد حجوزات بعد</p>";
            return;
        }

        list.innerHTML = snap.docs.map(doc => {
            const b = doc.data();
            return `
            <div class="card p-6 border-r-8 border-teal-500 flex justify-between items-center">
                <div>
                    <h4 class="font-bold">${b.salon}</h4>
                    <p class="text-xs text-gray-400">Tx: ${(b.txid || '').slice(0,12)}...</p>
                </div>
                <div class="text-right">
                    <div class="text-teal-600 font-black text-xl">${b.amount}</div>
                    <div class="text-xs text-gray-400">Pi</div>
                </div>
            </div>`;
        }).join('');
    } catch (e) {
        console.error(e);
        list.innerHTML = "<p class='text-red-500 text-center'>خطأ في تحميل الحجوزات</p>";
    }
}

// بناء الصالونات
document.getElementById("salon-container").innerHTML = salons.map(s => `
    <div class="card">
        <img src="${s.img}" class="w-full h-52 object-cover">
        <div class="p-5">
            <h3 class="font-bold text-xl">${s.name}</h3>
            <p class="text-gray-500">${s.city}</p>
            <div class="mt-6 flex justify-between items-center">
                <div class="text-2xl font-bold text-teal-600">${s.price} <span class="text-base text-gray-400">Pi</span></div>
                <button onclick='window.book(${JSON.stringify(s)})' class="btn-pi px-8 py-3 rounded-2xl font-bold">احجز الآن</button>
            </div>
        </div>
    </div>
`).join('');

</script>
</body>
</html>
