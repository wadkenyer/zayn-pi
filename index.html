<script type="module">
    // ... إعدادات Firebase كما هي ...

    // دالة معالجة الدفعات المعلقة (تم تعديل المسارات لتناسب Vercel)
    const onIncompletePaymentFound = async (payment) => {
        const paymentId = payment.identifier || payment.paymentId;
        try {
            const status = payment.status;
            if (status === 'INITIATED') {
                await fetch('/api/approve', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ paymentId }) 
                });
            } else if (status === 'APPROVED') {
                await fetch('/api/complete', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ paymentId, txid: payment.transaction?.txid }) 
                });
            }
        } catch (e) {
            console.error("Incomplete payment error:", e);
        }
    };

    // ... دالة initPi و switchPage كما هي ...

    window.book = async (salon) => {
        if (isProcessingPayment) return;
        if (!currentUser) return alert("يرجى تسجيل الدخول أولاً");
        
        isProcessingPayment = true;
        try {
            await Pi.createPayment({
                amount: salon.price,
                memo: `حجز في ${salon.name}`,
                metadata: { salonId: salon.id }
            }, {
                onReadyForServerApproval: async (paymentId) => {
                    // الاتصال بـ Vercel Function مباشرة
                    await fetch('/api/approve', { 
                        method: 'POST', 
                        headers: { 'Content-Type': 'application/json' }, 
                        body: JSON.stringify({ paymentId }) 
                    });
                },
                onReadyForServerCompletion: async (paymentId, txid) => {
                    // إكمال العملية في شبكة Pi
                    await fetch('/api/complete', { 
                        method: 'POST', 
                        headers: { 'Content-Type': 'application/json' }, 
                        body: JSON.stringify({ paymentId, txid }) 
                    });

                    // تسجيل الحجز في Firebase
                    await addDoc(collection(db, "bookings"), {
                        user: currentUser.username,
                        salon: salon.name,
                        amount: salon.price,
                        txid: txid,
                        createdAt: serverTimestamp()
                    });
                    
                    alert("✅ تم الحجز بنجاح!");
                    switchPage('bookings-page');
                },
                onCancel: () => { isProcessingPayment = false; },
                onError: (err) => { isProcessingPayment = false; console.error(err); }
            });
        } catch (e) {
            isProcessingPayment = false;
        }
    };
    // ... باقي الدوال كما هي ...
</script>
