<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAYN PI | صالون حلاقة وتجميل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --teal: #4DAF9F; }
        body { background: #F8F9FA; font-family: system-ui, sans-serif; }
        .card { background: #fff; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); overflow: hidden; }
        .sidebar { transform: translateX(100%); transition: all 0.4s ease; }
        .sidebar.open { transform: translateX(0); }
    </style>
</head>
<body class="p-4 pb-28 min-h-screen">

<!-- زر فتح القائمة -->
<button onclick="toggleSidebar()" class="fixed top-6 right-6 z-50 bg-white shadow-md p-3 rounded-2xl text-2xl">
    <i class="fas fa-bars"></i>
</button>

<!-- Sidebar -->
<div id="sidebar" class="sidebar fixed top-0 right-0 h-full w-80 bg-white shadow-2xl z-[100] p-6">
    <div class="flex justify-between items-center mb-8">
        <h2 class="text-2xl font-bold text-teal-600">ZAYN PI</h2>
        <button onclick="toggleSidebar()" class="text-3xl">✕</button>
    </div>

    <div class="space-y-2 text-lg">
        <a href="#" onclick="toggleSidebar()" class="flex items-center gap-3 p-4 hover:bg-teal-50 rounded-2xl"><i class="fas fa-home"></i> الرئيسية</a>
        <a href="#" onclick="toggleSidebar()" class="flex items-center gap-3 p-4 hover:bg-teal-50 rounded-2xl"><i class="fas fa-store"></i> سجل صالونك</a>
        <a href="#" onclick="toggleSidebar()" class="flex items-center gap-3 p-4 hover:bg-teal-50 rounded-2xl"><i class="fas fa-wallet"></i> المحفظة</a>
        <a href="#" onclick="toggleSidebar()" class="flex items-center gap-3 p-4 hover:bg-teal-50 rounded-2xl"><i class="fas fa-users"></i> المجتمع</a>
        <a href="#" onclick="toggleSidebar()" class="flex items-center gap-3 p-4 hover:bg-teal-50 rounded-2xl"><i class="fas fa-star"></i> التقييمات والتعليقات</a>
        <a href="#" onclick="toggleSidebar()" class="flex items-center gap-3 p-4 hover:bg-teal-50 rounded-2xl"><i class="fas fa-map-marked-alt"></i> الموقع على الخريطة</a>
        <a href="#" onclick="toggleSidebar()" class="flex items-center gap-3 p-4 hover:bg-teal-50 rounded-2xl"><i class="fas fa-globe"></i> جميع الدول العربية</a>
    </div>

    <div class="mt-12 pt-6 border-t">
        <button onclick="initPi()" class="w-full py-4 bg-teal-600 text-white rounded-2xl font-bold flex items-center justify-center gap-2">
            <i class="fab fa-raspberry-pi"></i> دخول بـ Pi
        </button>
    </div>
</div>

<!-- باقي الصفحات (الرئيسية، حجوزاتي، حسابي) كما هي في الكود السابق -->
<!-- ... (يمكنك لصق باقي الـ HTML من النسخة السابقة هنا) ... -->

<script>
// فتح وإغلاق الـ Sidebar
function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("open");
}

// باقي الكود (initPi, book, loadBookings, إلخ) كما هو في النسخة السابقة

</script>
</body>
</html>
