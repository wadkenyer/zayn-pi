const onIncompletePaymentFound = async (payment) => {
    const paymentId = payment.identifier || payment.paymentId;
    console.log("Pending payment:", payment);

    try {
        if (payment.status === 'INITIATED') {
            await fetch('/api/approve', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ paymentId }) });
        } else if (payment.status === 'APPROVED') {
            if (payment.transaction?.txid) {
                await fetch('/api/complete', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ paymentId, txid: payment.transaction.txid }) });
            }
        } else {
            await fetch('/api/cancel', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ paymentId }) });
        }
    } catch (e) {}
};

window.initPi = async () => {
    try {
        await Pi.init({ version: "2.0", sandbox: true });
        const auth = await Pi.authenticate(['username', 'payments'], onIncompletePaymentFound);
        currentUser = auth.user;
        document.getElementById("user-greeting").innerHTML = `مرحباً ${currentUser.username}`;
    } catch (e) {
        alert("افتح التطبيق داخل Pi Browser");
    }
};

window.toggleSidebar = () => document.getElementById("sidebar").classList.toggle("open");

window.switchPage = (pageId) => {
