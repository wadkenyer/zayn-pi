<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAYN PI | صالون حلاقة وتجميل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --teal: #4DAF9F; --dark-teal: #3A8A7A; }
        body { background: #F8F9FA; font-family: system-ui, sans-serif; }
        .card { background: #fff; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); overflow: hidden; }
        .page { display: none; }
        .page.active { display: block; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; color: #888; }
        .nav-item.active { color: var(--teal); }
        .btn-pi { background: linear-gradient(135deg, var(--teal), var(--dark-teal)); color: white; }
        .modal-anim { animation: modalPop 0.3s ease forwards; }
        @keyframes modalPop { from { opacity: 0; transform: scale(0.95) translateY(30px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .time-slot-btn.active { background-color: #4DAF9F !important; color: white !important; border-color: #4DAF9F; }
    </style>
</head>
<body class="p-4 pb-28 min-h-screen">

<div id="home-page" class="page active">
    <div class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-3xl font-black text-teal-600">ZAYN PI</h1>
            <p id="user-greeting" class="text-sm text-gray-500">جاري التحقق...</p>
        </div>
        <button onclick="initPi()" class="px-6 py-2 bg-teal-600 text-white rounded-2xl text-sm font-medium">دخول بـ Pi</button>
    </div>
    <h2 class="text-xl font-bold mb-6">الصالونات المميزة</h2>
    <div id="salon-container" class="space-y-6"></div>
</div>

<div id="bookings-page" class="page">
    <h2 class="text-2xl font-bold text-center mb-6">حجوزاتي</h2>
    <div id="my-bookings-list" class="space-y-4"></div>
</div>

<div id="profile-page" class="page text-center">
    <div class="card p-10 mx-auto max-w-xs">
        <div class="w-24 h-24 mx-auto bg-teal-100 rounded-full flex items-center justify-center text-6xl mb-4">👤</div>
        <h3 id="profile-name" class="text-2xl font-bold">زائر</h3>
        <p id="profile-status" class="text-gray-500">مستخدم Pi Network</p>
    </div>
</div>

<div id="booking-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[9999]">
    <div class="modal-anim bg-white rounded-3xl w-full max-w-md mx-4 p-6">
        <h3 class="text-2xl font-bold mb-6 text-center" id="modal-salon-name"></h3>
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">اختر التاريخ</label>
            <input type="date" id="booking-date" class="w-full p-4 border border-gray-300 rounded-2xl text-lg focus:outline-none focus:border-teal-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-3">اختر الوقت</label>
            <div id="time-slots" class="grid grid-cols-4 gap-3"></div>
        </div>
        <div class="flex gap-3 mt-8">
            <button onclick="closeModal()" class="flex-1 py-4 text-lg font-medium border border-gray-300 rounded-2xl">إلغاء</button>
            <button onclick="confirmBooking()" class="flex-1 py-4 text-lg font-bold bg-teal-600 text-white rounded-2xl">تأكيد الحجز</button>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="switchPage('home-page', this)"><i class="fas fa-home text-2xl"></i><span class="text-xs">الرئيسية</span></div>
    <div class="nav-item" onclick="switchPage('bookings-page', this)"><i class="fas fa-calendar-check text-2xl"></i><span class="text-xs">حجوزاتي</span></div>
    <div class="nav-item" onclick="switchPage('profile-page', this)"><i class="fas fa-user text-2xl"></i><span class="text-xs">حسابي</span></div>
</nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, serverTimestamp, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = { apiKey: "AIzaSyCVePZCyyeVw9xDlov2B_db8VsIEayw8Rk", authDomain: "zayn-pi.firebaseapp.com", projectId: "zayn-pi" };
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUser = null;
let selectedSalon = null;
let selectedTime = null;

const salons = [
    {id:"s1", name:"صالون الملكي", city:"القاهرة", price:0.5, rate:4.8, img:"https://images.unsplash.com/photo-1503951914875-452162b0f3f1?w=600"},
    {id:"s2", name:"Luxury Beauty", city:"دبي", price:1.0, rate:4.9, img:"https://images.unsplash.com/photo-1621605815971-fbc98d665033?w=600"},
    {id:"s3", name:"باربيرا برو", city:"الرياض", price:0.8, rate:4.7, img:"https://images.unsplash.com/photo-1556228720-195a672ee8b6?w=600"}
];

// وظيفة الدخول
window.initPi = async () => {
    try {
        await Pi.init({ version: "2.0", sandbox: true });
        const auth = await Pi.authenticate(['username', 'payments']);
        currentUser = auth.user;
        document.getElementById("user-greeting").innerHTML = `مرحباً، <span class="font-bold text-teal-600">${currentUser.username}</span>`;
        document.getElementById("profile-name").textContent = currentUser.username;
        document.getElementById("profile-status").textContent = "متصل ✓";
    } catch (e) {
        alert("يرجى فتح التطبيق داخل Pi Browser");
    }
};

// وظيفة التنقل
window.switchPage = (pageId, el) => {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    if(el) el.classList.add('active');
    if (pageId === 'bookings-page') loadBookings();
};

// فتح المودال
window.openBookingModal = (salon) => {
    if (!currentUser) return alert("يرجى تسجيل الدخول أولاً بالضغط على 'دخول بـ Pi'");
    selectedSalon = salon;
    document.getElementById("modal-salon-name").textContent = `حجز في ${salon.name}`;
    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);
    document.getElementById("booking-date").value = tomorrow.toISOString().split('T')[0];
    generateTimeSlots();
    document.getElementById("booking-modal").classList.remove("hidden");
};

function generateTimeSlots() {
    const container = document.getElementById("time-slots");
    container.innerHTML = "";
    for (let h = 10; h <= 21; h++) {
        const timeStr = `${h}:00`;
        const btn = document.createElement("button");
        btn.className = "time-slot-btn py-3 text-sm font-medium rounded-2xl border border-gray-300 hover:border-teal-500 transition";
        btn.textContent = timeStr;
        btn.onclick = () => {
            document.querySelectorAll(".time-slot-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            selectedTime = timeStr;
        };
        container.appendChild(btn);
    }
}

window.closeModal = () => {
    document.getElementById("booking-modal").classList.add("hidden");
    selectedTime = null;
};

// تأكيد الحجز والدفع
window.confirmBooking = async () => {
    const date = document.getElementById("booking-date").value;
    if (!selectedTime) return alert("يرجى اختيار الوقت");
    const fullDateTime = `${date} ${selectedTime}`;

    try {
        const paymentData = {
            amount: selectedSalon.price,
            memo: `حجز ${selectedSalon.name} - ${fullDateTime}`,
            metadata: { salon: selectedSalon.name, dateTime: fullDateTime }
        };

        await Pi.createPayment(paymentData, {
            onReadyForServerApproval: async (paymentId) => {
                await fetch('/api/approve', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({paymentId}) });
            },
            onReadyForServerCompletion: async (paymentId, txid) => {
                await fetch('/api/complete', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({paymentId, txid}) });
                await addDoc(collection(db, "bookings"), {
                    user: currentUser.username,
                    salon: selectedSalon.name,
                    city: selectedSalon.city,
                    amount: selectedSalon.price,
                    txid: txid,
                    dateTime: fullDateTime,
                    status: "confirmed",
                    createdAt: serverTimestamp()
                });
                alert(`✅ تم الحجز بنجاح!\n${selectedSalon.name}\n${fullDateTime}`);
                closeModal();
                switchPage('bookings-page');
            },
            onCancel: () => alert("تم إلغاء الدفع"),
            onError: (err) => alert("خطأ في الدفع")
        });
    } catch (e) {
        alert("حدث خطأ أثناء الحجز");
    }
};

async function loadBookings() {
    const list = document.getElementById("my-bookings-list");
    if (!currentUser) return;
    list.innerHTML = "<div class='text-center py-10'><i class='fas fa-circle-notch fa-spin text-teal-500 text-3xl'></i></div>";
    try {
        const q = query(collection(db, "bookings"), where("user", "==", currentUser.username), orderBy("createdAt", "desc"));
        const snap = await getDocs(q);
        if (snap.empty) {
            list.innerHTML = "<p class='text-center text-gray-400 py-10'>لا توجد حجوزات بعد</p>";
            return;
        }
        let html = '';
        snap.forEach(doc => {
            const b = doc.data();
            html += `<div class="card p-6 border-r-8 border-teal-500">
                <h4 class="font-bold text-lg">${b.salon}</h4>
                <p class="text-teal-600 font-medium">${b.dateTime}</p>
                <div class="flex justify-between items-center mt-3">
                    <p class="text-xs text-gray-400">Tx: ${b.txid ? b.txid.substring(0,10) : '...'}</p>
                    <span class="text-teal-600 font-black">${b.amount} Pi</span>
                </div>
            </div>`;
        });
        list.innerHTML = html;
    } catch (e) {
        list.innerHTML = "<p class='text-red-500 text-center'>خطأ في تحميل البيانات</p>";
    }
}

// بناء الصالونات عند التحميل
document.getElementById("salon-container").innerHTML = salons.map(s => `
    <div class="card">
        <img src="${s.img}" class="w-full h-52 object-cover">
        <div class="p-5">
            <h3 class="font-bold text-xl">${s.name}</h3>
            <p class="text-gray-500">${s.city}</p>
            <div class="mt-6 flex justify-between items-center">
                <div class="text-2xl font-bold text-teal-600">${s.price} <span class="text-base text-gray-400">Pi</span></div>
                <button onclick='openBookingModal(${JSON.stringify(s)})' class="btn-pi px-8 py-3 rounded-2xl font-bold active:scale-95 transition">احجز الآن</button>
            </div>
        </div>
    </div>
`).join('');
</script>
</body>
</html>
