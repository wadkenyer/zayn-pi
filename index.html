<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAYN PI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: system-ui; background: #f8f9fa; }
        .card { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="p-4">

<h1 class="text-3xl font-bold text-center my-8 text-teal-600">ZAYN PI</h1>

<div id="status" class="text-center mb-6">جاري التحقق من Pi...</div>

<button onclick="initPi()" class="block mx-auto bg-teal-600 text-white px-8 py-4 rounded-2xl text-lg font-bold">
    دخول بـ Pi
</button>

<script>
let currentUser = null;

async function initPi() {
    try {
        await Pi.init({ version: "2.0", sandbox: true });
        const auth = await Pi.authenticate(['username', 'payments']);
        currentUser = auth.user;
        document.getElementById("status").innerHTML = `مرحباً ${currentUser.username} ✓`;
        alert("تم تسجيل الدخول بنجاح");
    } catch (e) {
        alert("فشل تسجيل الدخول - تأكد من Pi Browser");
    }
}
</script>
</body>
</html>
