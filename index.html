-bottom: 20px; } /* ===== SERVICE SELECT ===== */ .service-option { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; border: 2px solid var(--border); border-radius: 16px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s; } .service-option:hover { border-color: var(--teal); } .service-option.selected { border-color: var(--teal); background: var(--teal-light); } .service-option.selected-women { border-color: #F56496; background: #FFF0F6; } .service-name { font-weight: 700; font-size: 15px; } .service-duration { font-size: 12px; color: var(--gray); margin-top: 2px; } .service-price { font-weight: 900; font-size: 16px; color: var(--teal); } .service-price-women { color: #C4386B; } /* ===== DATE/TIME ===== */ .section-label { font-weight: 700; font-size: 14px; color: var(--gray); margin-bottom: 10px; margin-top: 16px; } .date-input { width: 100%; padding: 14px 16px; border: 2px solid var(--border); border-radius: 16px; font-family: 'Cairo', sans-serif; font-size: 15px; outline: none; transition: border-color 0.2s; } .date-input:focus { border-color: var(--teal); } .time-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; } .time-btn { padding: 10px 6px; border: 2px solid var(--border); border-radius: 12px; font-family: 'Cairo', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; background: #fff; transition: all 0.2s; color: var(--dark); } .time-btn:hover { border-color: var(--teal); color: var(--teal); } .time-btn.selected { background: var(--teal); border-color: var(--teal); color: #fff; } .time-btn.selected-women { background: #C4386B; border-color: #C4386B; color: #fff; } /* ===== CONFIRM BTN ===== */ .confirm-btn { width: 100%; padding: 16px; border: none; border-radius: 18px; font-family: 'Cairo', sans-serif; font-size: 16px; font-weight: 900; cursor: pointer; margin-top: 20px; transition: all 0.2s; background: var(--dark); color: #fff; } .confirm-btn:hover { background: var(--teal); tr
