<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAYN PI</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#F8F9FA; font-family:sans-serif; }
.card { background:white; border-radius:15px; padding:15px; margin-bottom:15px; }
.btn { background:#FF8A80; color:white; padding:10px; width:100%; border:none; border-radius:10px; }
</style>
</head>

<body class="p-4">

<h2>زين باي</h2>

<div id="salons"></div>

<!-- 🔥 Firebase هنا -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "ضع_هنا",
  authDomain: "ضع_هنا",
  projectId: "ضع_هنا",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// عرض بيانات تجريبية
const salons = [
  {name:"صالون الملكي", price:3},
  {name:"Luxury Barber", price:5}
];

const container = document.getElementById("salons");

salons.forEach(salon => {
  container.innerHTML += `
    <div class="card">
      <h3>${salon.name}</h3>
      <p>${salon.price} Pi</p>
      <button class="btn" onclick="book('${salon.name}', ${salon.price})">احجز الآن</button>
    </div>
  `;
});

// 🔥 حفظ الحجز
window.book = async (name, price) => {
  try {
    await addDoc(collection(db, "bookings"), {
      salon: name,
      price: price,
      date: new Date()
    });
    alert("تم الحجز بنجاح 🔥");
  } catch (e) {
    alert("خطأ: " + e.message);
  }
};
</script>

</body>
</html>
