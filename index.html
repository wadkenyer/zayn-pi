<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAYN PI | تشغيل كامل الخصائص</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --teal: #4DAF9F; --coral: #FF8A80; --bg: #F8F9FA; }
        body { background: var(--bg); font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .card { background: #fff; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.04); overflow: hidden; margin-bottom: 15px; transition: 0.3s; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.2s; }
        .nav-item.active { color: var(--teal); }
        .nav-item:not(.active) { color: #ccc; }
        .btn-loading { opacity: 0.7; pointer-events: none; }
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body class="p-4 pb-24">

<div id="home-page" class="page active">
    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl font-black text-teal-600">ZAYN PI</h1>
            <p id="user-greeting" class="text-xs text-gray-400">جاري التحقق...</p>
        </div>
        <div class="w-10 h-10 bg-gray-200 rounded-full flex items-center justify-center cursor-pointer" onclick="switchPage('profile-page')">
            <i class="fas fa-user text-gray-500"></i>
        </div>
    </div>

    <div id="salon-container"></div>
</div>

<div id="bookings-page" class="page">
    <h2 class="text-xl font-bold mb-4 text-center">حجوزاتي القادمة</h2>
    <div id="my-bookings-list" class="text-center text-gray-400 mt-10">لا توجد حجوزات حالياً</div>
</div>

<div id="profile-page" class="page">
    <h2 class="text-xl font-bold mb-4 text-center">الملف الشخصي</h2>
    <div class="card p-6 text-center">
        <div class="w-20 h-20 bg-teal-100 rounded-full mx-auto mb-4 flex items-center justify-center">
            <i class="fas fa-user text-3xl text-teal-600"></i>
        </div>
        <h3 id="profile-name" class="font-bold text-lg">زائر</h3>
        <p class="text-sm text-gray-400 mb-4">مستخدم شبكة باي</p>
        <button class="w-full py-2 bg-gray-100 rounded-lg text-sm" onclick="location.reload()">تحديث البيانات</button>
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="switchPage('home-page', this)">
        <i class="fas fa-home text-xl"></i>
        <span class="text-[10px] mt-1">الرئيسية</span>
    </div>
    <div class="nav-item" onclick="switchPage('bookings-page', this)">
        <i class="fas fa-calendar-check text-xl"></i>
        <span class="text-[10px] mt-1">حجوزاتي</span>
    </div>
    <div class="nav-item" onclick="switchPage('profile-page', this)">
        <i class="fas fa-user text-xl"></i>
        <span class="text-[10px] mt-1">حسابي</span>
    </div>
</nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔥 Firebase Config */
const firebaseConfig = {
    apiKey: "AIzaSyCVePZCyyeVw9xDlov2B_db8VsIEayw8Rk",
    authDomain: "zayn-pi.firebaseapp.com",
    projectId: "zayn-pi",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 🔥 البيانات */
const salons = [
    {id:"s1", name:"صالون الملكي", city:"القاهرة", price:3, rate:4.8, img:"https://images.unsplash.com/photo-1503951914875-452162b0f3f1?w=200"},
    {id:"s2", name:"Luxury Barber", city:"دبي", price:5, rate:4.9, img:"https://images.unsplash.com/photo-1621605815971-fbc98d665033?w=200"}
];

let currentUser = "Guest";

/* 🔥 تشغيل الأزرار السفلية (التنقل بين الصفحات) */
window.switchPage = (pageId, element) => {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
    
    if(element) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        element.classList.add('active');
    }
};

/* 🔥 عرض الصالونات وتفعيل أزرار الحجز */
const container = document.getElementById("salon-container");
salons.forEach(s => {
    const div = document.createElement('div');
    div.className = "card";
    div.innerHTML = `
        <div class="flex p-4 gap-4 items-center">
            <img src="${s.img}" class="w-20 h-20 rounded-xl object-cover">
            <div class="flex-1">
                <h3 class="font-bold text-gray-800">${s.name}</h3>
                <p class="text-xs text-gray-400">${s.city}</p>
                <span class="text-yellow-500 text-xs font-bold">⭐ ${s.rate}</span>
            </div>
            <div class="text-teal-600 font-bold">${s.price} Pi</div>
        </div>
        <button id="btn-${s.id}" class="w-full py-4 text-white font-bold transition active:opacity-80" style="background:var(--coral)">
            احجز الآن
        </button>
    `;
    container.appendChild(div);
    document.getElementById(`btn-${s.id}`).onclick = () => handleBooking(s);
});

/* 🔥 تهيئة المستخدم (Pi SDK) */
async function initUser() {
    try {
        Pi.init({version: "2.0", sandbox: true});
        const auth = await Pi.authenticate(['username', 'payments'], (p) => {});
        currentUser = auth.user.username;
        document.getElementById("user-greeting").innerText = "مرحباً، " + currentUser;
        document.getElementById("profile-name").innerText = currentUser;
    } catch {
        document.getElementById("user-greeting").innerText = "وضع التجربة";
    }
}
initUser();

/* 🔥 تشغيل زر الحجز (الربط بـ Firebase) */
async function handleBooking(salon) {
    const btn = document.getElementById(`btn-${salon.id}`);
    btn.classList.add("btn-loading");
    btn.innerHTML = `<i class="fas fa-spinner fa-spin ml-2"></i> جاري الحجز...`;

    try {
        // تسجيل في Firebase
        await addDoc(collection(db, "bookings"), {
            salon: salon.name,
            price: salon.price,
            user: currentUser,
            createdAt: serverTimestamp()
        });

        btn.style.background = "#4DAF9F";
        btn.innerHTML = `<i class="fas fa-check-circle ml-2"></i> تم الحجز بنجاح!`;
        alert(`تهانينا يا ${currentUser}! تم تسجيل حجزك في ${salon.name}`);
    } catch (err) {
        btn.classList.remove("btn-loading");
        btn.innerText = "خطأ! حاول مجدداً";
        console.error(err);
    }
}
</script>
</body>
</html>
