<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAYN PI</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: #f5f7f6;
  font-family: sans-serif;
}

.card {
  background: white;
  border-radius: 20px;
  padding: 15px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

img {
  width: 90px;
  height: 90px;
  border-radius: 15px;
  object-fit: cover;
}
</style>
</head>

<body class="p-4">

<h2 class="text-xl font-bold mb-6 text-right">ZAYN PI</h2>

<div class="card">
  
  <button onclick="bookNow()" 
    class="bg-red-400 text-white px-5 py-2 rounded-lg font-bold">
    احجز
  </button>

  <div class="text-right flex-1 px-3">
    <h3 class="font-bold text-lg">صالون الملكي</h3>
    <p class="text-gray-400 text-sm">القاهرة</p>
    <p class="text-yellow-500">⭐ 4.8</p>
  </div>

  <img src="https://images.unsplash.com/photo-1503951914875-452162b0f3f1?w=200">
</div>

<!-- Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "ضع_هنا",
  authDomain: "ضع_هنا",
  projectId: "ضع_هنا",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.bookNow = async function () {
  try {
    await addDoc(collection(db, "bookings"), {
      salon: "صالون الملكي",
      city: "القاهرة",
      rating: 4.8,
      price: 3,
      createdAt: new Date()
    });

    alert("تم الحجز بنجاح ✅");

  } catch (e) {
    alert("خطأ ❌");
    console.log(e);
  }
};

</script>

</body>
</html>
