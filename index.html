<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAYN PI | صالون حلاقة وتجميل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --teal: #4DAF9F; --dark-teal: #3A8A7A; --bg: #F8F9FA; }
        body { background: var(--bg); font-family: system-ui, -apple-system, sans-serif; scroll-behavior: smooth; }
        .card { background: #fff; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); overflow: hidden; transition: all 0.3s ease; }
        .card:active { transform: scale(0.98); }
        .page { display: none; animation: fadeIn 0.4s ease-out; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; color: #BBB; transition: 0.3s; }
        .nav-item.active { color: var(--teal); font-weight: bold; }
        .btn-pi { background: linear-gradient(135deg, var(--teal), var(--dark-teal)); color: white; box-shadow: 0 4px 15px rgba(77, 175, 159, 0.3); }
        .btn-pi:disabled { opacity: 0.7; cursor: not-allowed; }
    </style>
</head>
<body class="p-4 pb-28">

<div id="home-page" class="page active">
    <div class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-3xl font-black text-teal-600 tracking-tight italic">ZAYN PI</h1>
            <p id="user-greeting" class="text-xs text-gray-500 font-medium">مرحباً بك في عالم الفخامة</p>
        </div>
        <div onclick="switchPage('profile-page')" class="w-12 h-12 bg-teal-50 rounded-2xl flex items-center justify-center text-2xl cursor-pointer border border-teal-100 shadow-sm">
            👤
        </div>
    </div>

    <h2 class="text-xl font-bold mb-5 text-gray-800 flex items-center gap-2">
        <i class="fas fa-star text-yellow-400"></i> الصالونات المختارة
    </h2>
    
    <div id="salon-container" class="space-y-8"></div>
</div>

<div id="bookings-page" class="page">
    <div class="text-center mb-8">
        <h2 class="text-2xl font-bold text-gray-800">حجوزاتي</h2>
        <p class="text-sm text-gray-400 mt-1">قائمة العمليات الناجحة</p>
    </div>
    <div id="my-bookings-list" class="space-y-4"></div>
</div>

<div id="profile-page" class="page text-center">
    <div class="card p-10">
        <div class="relative w-24 h-24 mx-auto mb-6">
            <div class="w-24 h-24 bg-teal-50 rounded-full flex items-center justify-center text-5xl border-4 border-white shadow-md">👤</div>
            <div id="online-dot" class="absolute bottom-1 right-1 w-5 h-5 bg-gray-300 border-4 border-white rounded-full"></div>
        </div>
        <h3 id="profile-name" class="text-2xl font-bold text-gray-800">زائر</h3>
        <p id="profile-status" class="text-gray-400 text-sm">مستكشف في Pi Network</p>
        
        <div class="mt-10 space-y-3">
            <button onclick="initPi()" id="login-btn" class="w-full py-4 btn-pi rounded-2xl font-bold flex items-center justify-center gap-2">
                <i class="fab fa-raspberry-pi"></i> دخول بواسطة Pi
            </button>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="switchPage('home-page', this)"><i class="fas fa-home text-2xl"></i><span class="text-[10px] mt-1 font-bold">الرئيسية</span></div>
    <div class="nav-item" onclick="switchPage('bookings-page', this)"><i class="fas fa-calendar-check text-2xl"></i><span class="text-[10px] mt-1 font-bold">حجوزاتي</span></div>
    <div class="nav-item" onclick="switchPage('profile-page', this)"><i class="fas fa-user text-2xl"></i><span class="text-[10px] mt-1 font-bold">حسابي</span></div>
</nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, serverTimestamp, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = { /* config الخاص بك */ };
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUser = null;
let isProcessingPayment = false;

const salons = [
    {id:"s1", name:"صالون الملكي", city:"القاهرة", price:0.5, rate:4.8, img:"https://images.unsplash.com/photo-1503951914875-452162b0f3f1?w=600"},
    {id:"s2", name:"Luxury Beauty", city:"دبي", price:1.0, rate:4.9, img:"https://images.unsplash.com/photo-1621605815971-fbc98d665033?w=600"},
    {id:"s3", name:"باربيرا برو", city:"الرياض", price:0.8, rate:4.7, img:"https://images.unsplash.com/photo-1556228720-195a672ee8b6?w=600"}
];

// معالجة الدفعات المعلقة (مهم جداً)
const onIncompletePaymentFound = async (payment) => {
    console.log("⚠️ Pending payment found:", payment);
    const paymentId = payment.identifier || payment.paymentId;

    try {
        if (payment.status === 'INITIATED') {
            await fetch('/api/pi/approve', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ paymentId })
            });
        } else if (payment.status === 'APPROVED') {
            await fetch('/api/pi/complete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ paymentId, txid: payment.transaction?.txid })
            });
        } else {
            await fetch('/api/pi/cancel', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ paymentId })
            });
        }
    } catch (e) {
        console.error("Failed to handle incomplete payment:", e);
    }
};

window.initPi = async () => {
    try {
        await Pi.init({ version: "2.0", sandbox: false });   // غير إلى true للتجربة فقط
        const auth = await Pi.authenticate(['username', 'payments'], onIncompletePaymentFound);
        
        currentUser = auth.user;
        document.getElementById("user-greeting").innerHTML = `مرحباً، <span class="font-bold text-teal-600">${currentUser.username}</span>`;
        document.getElementById("profile-name").textContent = currentUser.username;
        document.getElementById("profile-status").textContent = "مستخدم موثق ✓";
        document.getElementById("online-dot").classList.replace("bg-gray-300", "bg-green-500");
        document.getElementById("login-btn").style.display = "none";
    } catch (e) {
        console.error(e);
        alert("يرجى فتح التطبيق داخل Pi Browser");
    }
};

window.switchPage = (id, el) => {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if (el) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    }
    if (id === 'bookings-page') loadBookings();
};

window.book = async (s) => {
    if (isProcessingPayment) {
        alert("جاري معالجة الدفع السابق، يرجى الانتظار...");
        return;
    }
    if (!currentUser) {
        alert("يرجى تسجيل الدخول أولاً");
        await initPi();
        return;
    }

    isProcessingPayment = true;

    if (!confirm(`هل تود حجز موعد في ${s.name} بـ ${s.price} Pi؟`)) {
        isProcessingPayment = false;
        return;
    }

    try {
        const paymentData = {
            amount: s.price,
            memo: `حجز ${s.name} - ZAYN PI`,
            metadata: { salonId: s.id, salonName: s.name, user: currentUser.username }
        };

        await Pi.createPayment(paymentData, {
            onReadyForServerApproval: async (paymentId) => {
                await fetch('/api/pi/approve', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ paymentId })
                });
            },

            onReadyForServerCompletion: async (paymentId, txid) => {
                // 1. Complete
                await fetch('/api/pi/complete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ paymentId, txid })
                });

                // 2. Verify صارم
                const verifyRes = await fetch('/api/pi/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ paymentId })
                });
                const verifyData = await verifyRes.json();

                if (verifyData.status?.developer_completed === true && 
                    verifyData.status?.transaction_verified === true) {

                    await addDoc(collection(db, "bookings"), {
                        user: currentUser.username,
                        salon: s.name,
                        amount: s.price,
                        txid: txid,
                        status: "confirmed",
                        createdAt: serverTimestamp()
                    });

                    alert(`✅ تم الحجز بنجاح!\nرقم المعاملة: ${txid.slice(0, 12)}...`);
                    switchPage('bookings-page');
                } else {
                    alert("⚠️ الدفع تم تسجيله لكن لم يكتمل بشكل كامل");
                }
            },

            onCancel: () => {
                alert("تم إلغاء الدفع");
            },

            onError: (error) => {
                alert("خطأ في الدفع: " + (error.message || error));
            }
        });
    } catch (e) {
        console.error(e);
        alert("حدث خطأ أثناء بدء الدفع");
    } finally {
        isProcessingPayment = false;
    }
};

async function loadBookings() {
    const list = document.getElementById("my-bookings-list");
    if (!currentUser) {
        list.innerHTML = "<p class='text-center mt-10 text-gray-400'>سجل دخولك لرؤية حجوزاتك</p>";
        return;
    }
    // ... باقي كود loadBookings كما هو ...
}

// بناء الصالونات
document.getElementById("salon-container").innerHTML = salons.map(s => `
    <div class="card">
        <div class="relative">
            <img src="${s.img}" class="w-full h-60 object-cover" alt="${s.name}">
            <div class="absolute top-4 right-4 bg-white/90 px-3 py-1 rounded-xl text-sm font-bold">⭐ ${s.rate}</div>
        </div>
        <div class="p-6">
            <h3 class="font-bold text-2xl">${s.name}</h3>
            <p class="text-gray-500">${s.city}</p>
            <div class="mt-6 flex justify-between items-center">
                <div class="text-3xl font-black text-teal-600">${s.price} <span class="text-base font-normal text-gray-400">Pi</span></div>
                <button onclick='window.book(${JSON.stringify(s)})' class="btn-pi px-8 py-3.5 rounded-2xl font-bold">
                    احجز الآن
                </button>
            </div>
        </div>
    </div>
`).join('');

// بدء التطبيق
window.addEventListener('load', () => {
    initPi();
});
</script>
</body>
</html>
