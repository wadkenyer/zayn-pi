<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAYN PI | صالون حلاقة وتجميل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --teal: #4DAF9F; --bg: #F8F9FA; }
        body { background: var(--bg); font-family: system-ui, -apple-system, sans-serif; }
        .card { background: #fff; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); overflow: hidden; transition: 0.3s; }
        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 1000; box-shadow: 0 -5px 20px rgba(0,0,0,0.03); }
        .nav-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; color: #BBB; transition: 0.3s; }
        .nav-item.active { color: var(--teal); }
        .btn-pi { background: linear-gradient(135deg, #4DAF9F, #3A8A7A); color: white; box-shadow: 0 4px 15px rgba(77, 175, 159, 0.3); }
    </style>
</head>
<body class="p-4 pb-28">

<div id="home-page" class="page active">
    <div class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-3xl font-black text-teal-600 tracking-tight">ZAYN PI</h1>
            <p id="user-greeting" class="text-sm text-gray-500">مرحباً بك في عالم التجميل</p>
        </div>
        <div onclick="switchPage('profile-page')" class="w-12 h-12 bg-teal-50 rounded-2xl flex items-center justify-center text-2xl cursor-pointer border border-teal-100">
            👤
        </div>
    </div>

    <h2 class="text-xl font-bold mb-5 text-gray-800">الصالونات المميزة</h2>
    <div id="salon-container" class="space-y-8">
        </div>
</div>

<div id="bookings-page" class="page">
    <h2 class="text-2xl font-bold mb-8 text-center text-gray-800">حجوزاتي القادمة</h2>
    <div id="my-bookings-list" class="space-y-4">
        </div>
</div>

<div id="profile-page" class="page">
    <h2 class="text-2xl font-bold mb-8 text-center">حسابي الشخصي</h2>
    <div class="card p-10 text-center">
        <div class="w-24 h-24 bg-teal-50 rounded-full mx-auto mb-6 flex items-center justify-center text-5xl border-4 border-white shadow-lg">👤</div>
        <h3 id="profile-name" class="text-2xl font-bold text-gray-800">زائر</h3>
        <p id="profile-status" class="text-gray-400">مستخدم Pi Network</p>
        <div class="mt-10 space-y-3">
            <button onclick="initPi()" class="w-full py-4 btn-pi rounded-2xl font-bold">تسجيل الدخول بـ Pi</button>
            <button onclick="location.reload()" class="w-full py-4 bg-gray-100 text-gray-600 rounded-2xl font-medium">تحديث البيانات</button>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="switchPage('home-page', this)">
        <i class="fas fa-home text-2xl"></i><span class="text-[10px] mt-1 font-bold">الرئيسية</span>
    </div>
    <div class="nav-item" onclick="switchPage('bookings-page', this)">
        <i class="fas fa-calendar-check text-2xl"></i><span class="text-[10px] mt-1 font-bold">حجوزاتي</span>
    </div>
    <div class="nav-item" onclick="switchPage('profile-page', this)">
        <i class="fas fa-user text-2xl"></i><span class="text-[10px] mt-1 font-bold">حسابي</span>
    </div>
</nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, serverTimestamp, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// إعداد Firebase (تأكد من وضع الـ Key الخاص بك هنا)
const firebaseConfig = { apiKey: "YOUR_FIREBASE_KEY", projectId: "zayn-pi" };
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let user = null;
const salons = [
    {id:"s1", name:"صالون الملكي", city:"القاهرة", price:4.5, rate:4.8, img:"https://images.unsplash.com/photo-1503951914875-452162b0f3f1?w=600"},
    {id:"s2", name:"Luxury Beauty", city:"دبي", price:7, rate:4.9, img:"https://images.unsplash.com/photo-1621605815971-fbc98d665033?w=600"},
    {id:"s3", name:"باربيرا برو", city:"الرياض", price:5.5, rate:4.7, img:"https://images.unsplash.com/photo-1556228720-195a672ee8b6?w=600"}
];

window.initPi = async () => {
    try {
        await Pi.init({ version: "2.0", sandbox: true });
        const auth = await Pi.authenticate(['username', 'payments']);
        user = auth.user;
        document.getElementById("user-greeting").innerHTML = `مرحباً، <span class="font-bold text-teal-600">${user.username}</span>`;
        document.getElementById("profile-name").textContent = user.username;
        document.getElementById("profile-status").textContent = "متصل ✓";
    } catch (e) {
        console.error(e);
        alert("فشل تسجيل الدخول");
    }
};

window.switchPage = (id, el) => {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if (el) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    }
    if (id === 'bookings-page') loadBookings();
};

window.book = async (s) => {
    if (!user) { await initPi(); if(!user) return; }
    if (!confirm(`هل تود تأكيد حجزك في ${s.name} مقابل ${s.price} Pi؟`)) return;

    try {
        await Pi.createPayment({
            amount: s.price,
            memo: `حجز في ${s.name} - ZAYN PI`,
            metadata: { salonId: s.id }
        }, {
            onReadyForServerApproval: async (paymentId) => {
                const res = await fetch('/api/approve', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ paymentId })
                });
                const data = await res.json();
                if(!res.ok || !data.success) throw new Error("Approval failed");
                return data;
            },
            onReadyForServerCompletion: async (paymentId, txid) => {
                await addDoc(collection(db, "bookings"), {
                    user: user.username,
                    salon: s.name,
                    amount: s.price,
                    txid: txid,
                    createdAt: serverTimestamp()
                });
                alert("✅ تم الحجز بنجاح!");
                switchPage('bookings-page');
            },
            onCancel: () => console.log("Canceled"),
            onError: (e) => alert("خطأ: " + e.message)
        });
    } catch (e) { alert("فشل بدء عملية الدفع"); }
};

async function loadBookings() {
    const list = document.getElementById("my-bookings-list");
    if (!user) { list.innerHTML = "<p class='text-center mt-20 text-gray-400'>سجل دخولك لرؤية حجوزاتك</p>"; return; }
    list.innerHTML = "<div class='text-center py-20'><i class='fas fa-spinner fa-spin text-teal-500 text-3xl'></i></div>";
    
    try {
        const q = query(collection(db, "bookings"), where("user", "==", user.username), orderBy("createdAt", "desc"));
        const snap = await getDocs(q);
        if (snap.empty) { list.innerHTML = "<p class='text-center mt-20 text-gray-400'>لا توجد حجوزات سابقة</p>"; return; }
        
        list.innerHTML = snap.docs.map(doc => {
            const b = doc.data();
            return `
            <div class="card p-6 border-r-8 border-teal-500">
                <div class="flex justify-between items-center">
                    <div>
                        <h4 class="font-bold text-lg text-gray-800">${b.salon}</h4>
                        <p class="text-xs text-gray-400 mt-1">المعاملة: ${b.txid.substring(0,12)}...</p>
                    </div>
                    <div class="text-teal-600 font-black text-xl">${b.amount} Pi</div>
                </div>
            </div>`;
        }).join('');
    } catch (e) { list.innerHTML = "<p class='text-red-500 text-center'>خطأ في تحميل البيانات</p>"; }
}

// عرض الصالونات بالتصميم الفخم (صور كبيرة + تدرج ظلال)
const container = document.getElementById("salon-container");
container.innerHTML = salons.map(s => `
    <div class="card shadow-xl border border-gray-50">
        <div class="relative">
            <img src="${s.img}" class="w-full h-56 object-cover">
            <div class="absolute top-4 right-4 bg-white/90 backdrop-blur px-3 py-1 rounded-xl text-yellow-600 font-bold text-sm shadow-sm">
                ⭐ ${s.rate}
            </div>
        </div>
        <div class="p-6">
            <div class="flex justify-between items-start">
                <div>
                    <h3 class="font-bold text-2xl text-gray-800">${s.name}</h3>
                    <p class="text-gray-400 flex items-center gap-1 mt-1">
                        <i class="fas fa-map-marker-alt text-teal-500 text-xs"></i> ${s.city}
                    </p>
                </div>
                <div class="text-right">
                    <span class="text-2xl font-black text-teal-600">${s.price}</span>
                    <span class="text-xs text-gray-400 block font-bold">Pi</span>
                </div>
            </div>
            <button onclick='window.book(${JSON.stringify(s)})' class="w-full mt-6 py-4 btn-pi rounded-2xl font-bold text-lg active:scale-95 transition-transform shadow-lg">
                احجز الآن
            </button>
        </div>
    </div>
`).join('');

initPi();
</script>
</body>
</html>
