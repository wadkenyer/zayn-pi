<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAYN PI</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
  --teal:#4DAF9F;
  --coral:#FF8A80;
  --bg:#F8F9FA;
}

body {
  background: var(--bg);
  font-family: system-ui;
  margin:0;
}

/* تحسين الأداء */
.card {
  background:#fff;
  border-radius:18px;
  box-shadow:0 6px 15px rgba(0,0,0,0.05);
  overflow:hidden;
}

/* زر */
.btn {
  background: var(--coral);
  color:white;
  width:100%;
  padding:14px;
  border:none;
  font-weight:bold;
}

/* تحميل سلس */
.fade {
  animation: fade .3s ease;
}
@keyframes fade {
  from{opacity:0}
  to{opacity:1}
}

/* navbar */
.bottom-nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px;
  border-top:1px solid #eee;
}
</style>
</head>

<body class="p-4 pb-20">

<!-- HEADER -->
<div class="flex justify-between items-center mb-5">
  <h2 class="font-black text-xl text-teal-600">ZAYN PI</h2>
  <div class="w-10 h-10 bg-gray-200 rounded-full flex items-center justify-center">
    <i class="fas fa-user"></i>
  </div>
</div>

<!-- SEARCH -->
<input type="text" placeholder="ابحث عن صالون..."
class="w-full p-3 rounded-xl mb-5 outline-none">

<!-- LIST -->
<div id="app"></div>

<!-- NAV -->
<div class="bottom-nav">
  <div>🏠</div>
  <div>📅</div>
  <div>👤</div>
</div>

<script>
const salons = [
 {name:"صالون الملكي", city:"القاهرة", price:3, rate:4.8, img:"https://images.unsplash.com/photo-1503951914875-452162b0f3f1?w=200"},
 {name:"Luxury Barber", city:"دبي", price:5, rate:4.9, img:"https://images.unsplash.com/photo-1621605815971-fbc98d665033?w=200"}
];

const app = document.getElementById("app");

// تحميل سريع بدون lag
window.onload = () => {
 salons.forEach(s => {
   app.innerHTML += `
   <div class="card fade mb-4">
     <div class="flex p-3 items-center gap-3">
       <img src="${s.img}" class="w-20 h-20 rounded-xl object-cover">

       <div class="flex-1">
         <h3 class="font-bold">${s.name}</h3>
         <p class="text-xs text-gray-400">${s.city}</p>
         <span class="text-yellow-500 text-xs">⭐ ${s.rate}</span>
       </div>

       <div class="text-teal-600 font-bold">
         ${s.price} Pi
       </div>
     </div>

     <button class="btn" onclick="book('${s.name}',${s.price})">
       احجز الآن
     </button>
   </div>
   `;
 });
};

// زر الحجز
function book(name,price){
 alert("تم حجز: "+name+" بسعر "+price+" Pi");
}
</script>

</body>
</html>
