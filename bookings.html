<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حجوزاتي - ZAYN PI</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background: #f8f9fa; }
        .card { 
            background: white; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); 
            padding: 20px; 
            margin-bottom: 16px;
            border-right: 6px solid #14b8a6;
        }
        .loading { text-align: center; padding: 40px 20px; color: #666; }
    </style>
</head>
<body class="p-4 pb-24">

    <div class="max-w-md mx-auto">
        <h2 class="text-3xl font-bold text-center mb-8 text-teal-700">حجوزاتي</h2>
        
        <div id="list" class="min-h-[300px]"></div>
    </div>

    <nav class="nav fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 py-3">
        <div class="flex justify-around max-w-md mx-auto">
            <a href="index.html" class="text-2xl">🏠</a>
            <a href="bookings.html" class="text-2xl text-teal-600">📅</a>
            <a href="profile.html" class="text-2xl">👤</a>
        </div>
    </nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCVePZCyyeVw9xDlov2B_db8VsIEayw8Rk",
  authDomain: "zayn-pi.firebaseapp.com",
  projectId: "zayn-pi",
  storageBucket: "zayn-pi.firebasestorage.app",
  messagingSenderId: "1048366878166",
  appId: "1:1048366878166:web:550f80d91286b61c866877"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let user = null;

// تحميل بيانات المستخدم من localStorage (مهم جداً لأن الصفحات منفصلة)
function loadUser() {
    const savedUser = localStorage.getItem("piUser");
    if (savedUser) {
        user = JSON.parse(savedUser);
    }
}

async function loadBookings() {
    const list = document.getElementById("list");
    
    if (!user || !user.username) {
        list.innerHTML = `
            <div class="text-center py-20">
                <p class="text-gray-500 text-lg">يرجى تسجيل الدخول أولاً</p>
                <a href="index.html" class="text-teal-600 underline mt-4 inline-block">الذهاب إلى الصفحة الرئيسية</a>
            </div>`;
        return;
    }

    list.innerHTML = `
        <div class="loading">
            <i class="fas fa-circle-notch fa-spin text-4xl text-teal-500"></i>
            <p class="mt-4">جاري تحميل حجوزاتك...</p>
        </div>`;

    try {
        const q = query(
            collection(db, "bookings"),
            where("user", "==", user.username),
            orderBy("createdAt", "desc")
        );

        const snap = await getDocs(q);

        if (snap.empty) {
            list.innerHTML = `
                <div class="text-center py-20 text-gray-400">
                    <i class="fas fa-calendar-times text-6xl mb-4"></i>
                    <p class="text-lg">لا توجد حجوزات مسجلة بعد</p>
                </div>`;
            return;
        }

        let html = '';
        snap.forEach(doc => {
            const b = doc.data();
            
            let dateStr = 'قيد المعالجة';
            if (b.createdAt && b.createdAt.toDate) {
                dateStr = b.createdAt.toDate().toLocaleDateString('ar-EG', {
                    weekday: 'long',
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });
            }

            const txShort = b.txid ? b.txid.substring(0, 12) + '...' : '---';

            html += `
            <div class="card">
                <div class="flex justify-between items-start">
                    <div>
                        <h3 class="font-bold text-xl text-gray-800">${b.salon}</h3>
                        <p class="text-xs text-gray-500 mt-2 font-mono">TX: ${txShort}</p>
                        <p class="text-sm text-teal-600 mt-1">${dateStr}</p>
                    </div>
                    <div class="text-right">
                        <div class="text-3xl font-black text-teal-600">${b.amount}</div>
                        <div class="text-xs text-teal-400 font-bold">Pi</div>
                    </div>
                </div>
            </div>`;
        });

        list.innerHTML = html;

    } catch (e) {
        console.error("Error loading bookings:", e);
        
        if (e.message && e.message.includes("index")) {
            list.innerHTML = `
                <div class="text-center py-12 text-amber-600">
                    <p>يجب إنشاء فهرس (Index) في Firestore</p>
                    <p class="text-xs mt-3 text-gray-500">افتح Console المتصفح واضغط على الرابط لإنشاء الـ Index</p>
                </div>`;
        } else {
            list.innerHTML = `
                <div class="text-center py-12 text-red-500">
                    <p>حدث خطأ أثناء تحميل الحجوزات</p>
                </div>`;
        }
    }
}

// تشغيل الصفحة
window.addEventListener('load', () => {
    loadUser();
    loadBookings();
});
</script>

</body>
</html>
